version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    depends_on:
      - postgres
      - redis
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/chatapp?schema=public
      JWT_SECRET: replace-me-with-a-long-secret
      CLIENT_ORIGIN: http://localhost:4173
      COOKIE_NAME: chatapp_token
      NODE_ENV: production
      MAX_UPLOAD_SIZE_MB: 8
      PUBLIC_FILE_BASE_URL: http://localhost:4000
      STORAGE_PROVIDER: local
      REDIS_URL: redis://redis:6379
      AUTH_RATE_LIMIT_MAX: 10
      AUTH_RATE_LIMIT_WINDOW_MS: 600000
      MESSAGE_RATE_LIMIT_MAX: 40
      MESSAGE_RATE_LIMIT_WINDOW_MS: 60000
      UPLOAD_RATE_LIMIT_MAX: 20
      UPLOAD_RATE_LIMIT_WINDOW_MS: 600000
    ports:
      - "4000:4000"
    volumes:
      - server_uploads:/app/apps/server/uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - server
    environment:
      VITE_API_URL: http://localhost:4000
      VITE_SOCKET_URL: http://localhost:4000
    ports:
      - "4173:4173"

volumes:
  postgres_data:
  server_uploads:
